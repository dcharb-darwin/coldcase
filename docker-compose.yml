# Cold Case — full dev stack.
#
# All ports come from .env (durable rule, knowledge/launchpad/port-allocation.md).
# Backend + frontend both run with hot-reload via bind mounts.
#
# Bring up:        docker compose up
# Rebuild images:  docker compose up --build
# Logs only:       docker compose logs -f
# Tear down:       docker compose down            (preserves mongo data)
# Wipe data:       docker compose down -v         (destroys mongo volume)

services:
  mongo:
    image: mongo:7
    container_name: coldcase-mongo
    ports:
      - "${MONGO_PORT:-27022}:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./server-py
      dockerfile: Dockerfile
    container_name: coldcase-backend
    ports:
      - "${BACKEND_PORT:-7787}:7787"
    environment:
      # Inside the docker network the mongo service is reachable as `mongo`
      # on its native port 27017 — the published host port (MONGO_PORT) is
      # only for tools running on the host.
      MONGODB_URI: "mongodb://mongo:27017"
      DATABASE_NAME: "${DATABASE_NAME:-darwin_coldcase}"
      SERVICE_NAME: "${SERVICE_NAME:-coldcase}"
      IS_DEV_BYPASS_AUTH_ENABLED: "${IS_DEV_BYPASS_AUTH_ENABLED:-true}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      DEBUG: "${DEBUG:-true}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5178,http://localhost:3000}"
      UPLOAD_DIRECTORY: "/app/uploads"
      # LLM provider + key (durable rule: model name from env, never hard-coded)
      PROVIDER_LLM: "${PROVIDER_LLM:-mock}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.5}"
      COLDCASE_LLM_MULTIMODAL: "${COLDCASE_LLM_MULTIMODAL:-false}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      COLDCASE_LLM_MODEL: "${COLDCASE_LLM_MODEL:-qwen3.6:35b-a3b-nvfp4}"
      # Agency letterhead (Phase 4 / item A — leaving NAME blank disables it)
      COLDCASE_AGENCY_NAME: "${COLDCASE_AGENCY_NAME:-}"
      COLDCASE_AGENCY_JURISDICTION: "${COLDCASE_AGENCY_JURISDICTION:-}"
      COLDCASE_AGENCY_ORI: "${COLDCASE_AGENCY_ORI:-}"
      COLDCASE_AGENCY_ADDRESS: "${COLDCASE_AGENCY_ADDRESS:-}"
      COLDCASE_AGENCY_PHONE: "${COLDCASE_AGENCY_PHONE:-}"
      COLDCASE_AGENCY_LOGO_PATH: "${COLDCASE_AGENCY_LOGO_PATH:-}"
    volumes:
      # Hot-reload: bind-mount source so uvicorn --reload picks up changes.
      # The seeded PDFs live under ./server-py/uploads/ and persist naturally
      # via this mount; no separate named volume needed (and a named volume
      # here would shadow the source-mounted uploads dir).
      - ./server-py:/app
    depends_on:
      mongo:
        condition: service_healthy
    extra_hosts:
      # Lets the backend reach an Ollama instance running on the host machine.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: coldcase-frontend
    ports:
      - "${FRONTEND_PORT:-5178}:${FRONTEND_PORT:-5178}"
    environment:
      FRONTEND_PORT: "${FRONTEND_PORT:-5178}"
      # In-docker the vite proxy targets the backend container by service name.
      # (Outside docker the proxy falls back to localhost — see vite.config.ts.)
      VITE_PROXY_TARGET: "http://backend:7787"
    volumes:
      - ./:/app
      # Keep the container's node_modules isolated from any host node_modules.
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
    name: coldcase_mongo_data
  frontend_node_modules:
    name: coldcase_frontend_node_modules
